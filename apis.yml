aid: helion-energy
name: Helion Energy
description: >-
  Helion Energy is a fusion energy company headquartered in Everett, Washington
  pursuing a pulsed, magneto-inertial field-reversed-configuration (FRC) approach
  that uses a deuterium-helium-3 fuel cycle and direct electricity recovery
  rather than steam turbines. The company is on its seventh-generation
  prototype, Polaris, which achieved first plasma in 2024 and is targeted to
  demonstrate net electricity production from fusion. Helion's prior machines
  include Trenta, the sixth-generation prototype that reached fusion-relevant
  plasma temperatures, and Hercules, an earlier device. Orion is Helion's
  planned first commercial fusion power plant, with a publicly announced 2028
  target for delivering electricity to Microsoft under what the companies
  describe as the world's first commercial fusion power purchase agreement; a
  second customer agreement is in place with steelmaker Nucor. Helion is led by
  co-founder and CEO David Kirtley, CTO Chris Pihl, Chief Scientist George
  Votroubek, and co-founder Anthony Pancotti. Investors include Sam Altman
  (chair), Dustin Moskovitz, Reid Hoffman, SoftBank Vision Fund 2, Mithril
  Capital, Capricorn Investment Group, Peter Thiel, and others. Helion does not
  publish a public developer API or SDK.
